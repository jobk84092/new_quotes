<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- If GitHub “Enforce HTTPS” is off, still upgrade plain HTTP bookmarks / links. -->
    <script>
      (function () {
        var h = location.hostname;
        if (
          location.protocol === "http:" &&
          (h === "www.openourquotes.com" || h === "openourquotes.com")
        ) {
          location.replace(
            "https://" + location.host + location.pathname + location.search + location.hash
          );
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Open Our Quotes — discover quotations by topic, share on social media, or download shareable quote images."
    />
    <title>Open Our Quotes — Read, share & save quotations</title>
    <!-- Google AdSense — website publisher ca-pub-9907830179614621 (match secret VITE_ADSENSE_CLIENT). -->
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9907830179614621"
      crossorigin="anonymous"
    ></script>
    <!-- Search Console / other: optional meta verification tags below. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Source+Sans+3:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      html {
        visibility: visible;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
