name: new_quotes
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  path_provider: ^2.1.2
  sqflite: ^2.3.3
  google_mobile_ads: ^5.0.0
  in_app_purchase: ^3.2.0
  cupertino_icons: ^1.0.2
  introduction_screen: ^4.0.0
  lottie: ^3.3.1
  google_fonts: ^6.1.0
  flutter_spinkit: ^5.2.0
  dots_indicator: ^4.0.1
  shared_preferences: ^2.3.3

dependency_overrides:
  win32: 4.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/logo/
    - assets/db/quotes.db
    - assets/data/quotes.json
    - assets/data/categories.json
