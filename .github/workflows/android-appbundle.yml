name: Build Android APK & AAB

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.5"
          channel: stable
          cache: true

      - name: Flutter doctor (log)
        run: flutter doctor -v

      - name: Accept Android licenses (best-effort)
        run: yes | flutter doctor --android-licenses > /dev/null || true

      - name: Install dependencies
        run: flutter pub get

      - name: Set up release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | tr -d '\n\r ' | base64 -d > android/upload-keystore.jks
            cat > android/key.properties << EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=../upload-keystore.jks
          EOF
          fi

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Rename APK (include run + sha)
        shell: bash
        run: |
          set -euo pipefail
          SHA_SHORT="${GITHUB_SHA::7}"
          APK_IN="build/app/outputs/flutter-apk/app-release.apk"
          APK_OUT="build/app/outputs/flutter-apk/new_quotes-${GITHUB_RUN_NUMBER}-${SHA_SHORT}.apk"
          mv "$APK_IN" "$APK_OUT"
          echo "APK_OUT=$APK_OUT" >> "$GITHUB_ENV"

      - name: APK size (bytes)
        run: |
          ls -la build/app/outputs/flutter-apk
          stat -c "%s" "${APK_OUT}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: new_quotes-apk
          path: ${{ env.APK_OUT }}

      - name: Build AAB (release)
        run: flutter build appbundle --release

      - name: Rename AAB (include version + sha)
        shell: bash
        run: |
          set -euo pipefail
          SHA_SHORT="${GITHUB_SHA::7}"
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: *//' | cut -d'+' -f1)
          AAB_IN="build/app/outputs/bundle/release/app-release.aab"
          AAB_OUT="build/app/outputs/bundle/release/daily-quotes-${VERSION}-${GITHUB_RUN_NUMBER}-${SHA_SHORT}.aab"
          mv "$AAB_IN" "$AAB_OUT"
          echo "AAB_OUT=$AAB_OUT" >> "$GITHUB_ENV"

      - name: AAB size (bytes)
        run: |
          ls -la build/app/outputs/bundle/release
          stat -c "%s" "${AAB_OUT}"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-quotes-aab
          path: ${{ env.AAB_OUT }}
