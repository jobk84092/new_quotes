name: Build Android (AAB + APK)

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.5"
          channel: stable
          cache: true

      - name: Flutter doctor (log)
        run: flutter doctor -v

      - name: Accept Android licenses (best-effort)
        run: yes | flutter doctor --android-licenses > /dev/null || true

      - name: Install dependencies
        run: flutter pub get

      - name: Build appbundle (release)
        run: flutter build appbundle --release

      - name: Upload app bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Rename APK (include run + sha)
        shell: bash
        run: |
          set -euo pipefail
          SHA_SHORT="${GITHUB_SHA::7}"
          APK_IN="build/app/outputs/flutter-apk/app-release.apk"
          APK_OUT="build/app/outputs/flutter-apk/new_quotes-${GITHUB_RUN_NUMBER}-${SHA_SHORT}.apk"
          cp "$APK_IN" "$APK_OUT"
          echo "APK_OUT=$APK_OUT" >> "$GITHUB_ENV"

      - name: APK size (bytes)
        run: |
          ls -la build/app/outputs/flutter-apk
          stat -c "%s" build/app/outputs/flutter-apk/app-release.apk
          stat -c "%s" "${APK_OUT}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: new_quotes-apk
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            ${{ env.APK_OUT }}
